<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR境界可視化 WebApp Prototype</title>
    <style>
        :root {
            --primary: #ff3b30;
            --secondary: #007aff;
            --bg: #1c1c1e;
            --text: #ffffff;
            --glass: rgba(28, 28, 30, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            touch-action: none;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            pointer-events: none;
            z-index: 10;
        }

        #header {
            padding: 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            pointer-events: auto;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #controls {
            margin-top: auto;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button, label.file-label {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { background-color: var(--secondary); color: white; }
        .btn-disabled { background-color: #48484a; color: #8e8e93; cursor: not-allowed; }

        input[type="file"] {
            display: none;
        }

        #debug-log {
            height: 100px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #32d74b;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #ar-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .reticle {
            width: 40px;
            height: 40px;
            border: 3px solid white;
            border-radius: 50%;
            opacity: 0.6;
        }

        .reticle::after {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            background: white;
            margin: 15px;
            border-radius: 50%;
        }

        /* WebXR Button positioning override */
        #ARButton {
            bottom: 160px !important; /* Move it above our controls */
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="header">
            <h1>AR境界可視化 Prototye</h1>
            <div id="status">SIMAファイルを読み込んでください</div>
        </div>

        <div id="ar-overlay">
            <div class="reticle"></div>
            <div id="ar-guide-msg" style="text-shadow: 0 1px 4px black; font-weight: bold;">1点目をタップしてください</div>
        </div>

        <div id="controls">
            <div id="debug-log">システム待機中...</div>
            <div id="point-selectors" style="display: none; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="ref-point-1" style="font-size: 0.9rem;">基準点1:</label>
                    <select id="ref-point-1" style="flex: 1; margin-left: 10px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); font-size: 0.9rem;"></select>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="ref-point-2" style="font-size: 0.9rem;">基準点2:</label>
                    <select id="ref-point-2" style="flex: 1; margin-left: 10px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); font-size: 0.9rem;"></select>
                </div>
            </div>
            <div class="btn-group">
                <label class="file-label btn-secondary" for="file-input">
                    📂 SIMA読み込み
                </label>
                <input type="file" id="file-input" accept=".sim,.txt">
                <button id="place-btn" class="btn-primary btn-disabled" disabled>
                    📍 AR空間に配置
                </button>
            </div>
            <button id="reset-btn" class="btn-secondary" style="background-color: #3a3a3c;">
                🔄 リセット
            </button>
        </div>
    </div>

    <!-- Three.js and WebXR utilities -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- Logger ---
        const logElement = document.getElementById('debug-log');
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const entry = `[${time}] ${message}\n`;
            logElement.innerText += entry;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }

        // --- SIMA Parser ---
        class SIMAParser {
            static async parse(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const buffer = e.target.result;
                            // Shift-JISでデコード
                            const decoder = new TextDecoder('shift-jis');
                            const text = decoder.decode(buffer);
                            const lines = text.split(/\r?\n/);
                            
                            const data = {
                                points: [],      // { name, x, y, type }
                                connections: [], // [ [p1, p2], ... ]
                                center: { x: 0, y: 0 }
                            };

                            let sumX = 0, sumY = 0, count = 0;

                            lines.forEach(line => {
                                const parts = line.split(',');
                                const type = parts[0];

                                if (type === 'A01') {
                                    // A01,点名,コード,X,Y,H
                                    const name = parts[1];
                                    const x = parseFloat(parts[3]);
                                    const y = parseFloat(parts[4]);
                                    
                                    if (!isNaN(x) && !isNaN(y)) {
                                        data.points.push({ name, x, y, type: 'boundary' });
                                        sumX += x;
                                        sumY += y;
                                        count++;
                                    }
                                } else if (type === 'A02') {
                                    // A02 (引照点/準拠点)
                                    const name = parts[1];
                                    const x = parseFloat(parts[3]);
                                    const y = parseFloat(parts[4]);
                                    if (!isNaN(x) && !isNaN(y)) {
                                        data.points.push({ name, x, y, type: 'reference' });
                                    }
                                } else if (type === 'B01') {
                                    // B01のフォーマット: B01,画地名,点名1,点名2...
                                    // 画地名(parts[1])を除外し、点名データのみを抽出して結線データとする
                                    if (parts.length > 2) {
                                        const pts = parts.slice(2).map(p => p.trim()).filter(p => p !== '');
                                        if (pts.length > 0) {
                                            data.connections.push(pts);
                                        }
                                    }
                                }
                            });

                            if (count > 0) {
                                data.center.x = sumX / count;
                                data.center.y = sumY / count;
                            }

                            resolve(data);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }
        }

        // --- AR App ---
        class ARApp {
            constructor() {
                this.container = document.createElement('div');
                document.body.appendChild(this.container);

                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
                
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.xr.enabled = true;
                this.container.appendChild(this.renderer.domElement);

                // Lighting
                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
                light.position.set(0.5, 1, 0.25);
                this.scene.add(light);

                // AR UI
                this.setupARButton();
                
                // Hit Test
                this.hitTestSource = null;
                this.hitTestSourceRequested = false;
                this.reticle = new THREE.Mesh(
                    new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                this.reticle.matrixAutoUpdate = false;
                this.reticle.visible = false;
                this.scene.add(this.reticle);

                // Data Objects
                this.mapGroup = new THREE.Group();
                this.scene.add(this.mapGroup);
                this.simaData = null;
                
                // State and Points
                this.pointMap = new Map();
                this.placeState = 0; // 0: off, 1: wait tap1, 2: wait tap2
                this.tap1Pos = new THREE.Vector3();
                this.tap2Pos = new THREE.Vector3();
                
                // Tap Markers
                const markerGeom = new THREE.SphereGeometry(0.04);
                const markerMat = new THREE.MeshBasicMaterial({color: 0x32d74b});
                this.marker1 = new THREE.Mesh(markerGeom, markerMat);
                this.marker2 = new THREE.Mesh(markerGeom, markerMat);
                this.marker1.visible = false;
                this.marker2.visible = false;
                this.scene.add(this.marker1);
                this.scene.add(this.marker2);

                window.addEventListener('resize', () => this.onWindowResize());
                
                // Interaction
                this.controller = this.renderer.xr.getController(0);
                this.controller.addEventListener('select', () => this.onSelect());
                this.scene.add(this.controller);
            }

            setupARButton() {
                const btn = ARButton.createButton(this.renderer, {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: document.getElementById('ui-container') }
                });
                document.body.appendChild(btn);
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            loadSIMA(data) {
                this.simaData = data;
                this.clearMap();
                
                // 3Dオブジェクトの作成
                const pointGeom = new THREE.SphereGeometry(0.05, 16, 16); // 直径10cm
                const refGeom = new THREE.BoxGeometry(0.08, 0.08, 0.08); // 準拠点用立方体

                const boundMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                const refMat = new THREE.MeshStandardMaterial({ color: 0x007aff });

                this.pointMap.clear();
                
                const select1 = document.getElementById('ref-point-1');
                const select2 = document.getElementById('ref-point-2');
                select1.innerHTML = '';
                select2.innerHTML = '';

                data.points.forEach(p => {
                    // 座標変換: SIMA Y -> Three X, SIMA X -> Three -Z
                    // 基準点(center)からの相対座標
                    const relX = p.y - data.center.y;
                    const relZ = -(p.x - data.center.x);

                    const mesh = new THREE.Mesh(
                        p.type === 'boundary' ? pointGeom : refGeom,
                        p.type === 'boundary' ? boundMat : refMat
                    );
                    mesh.position.set(relX, 0, relZ);
                    this.mapGroup.add(mesh);
                    this.pointMap.set(p.name, mesh.position.clone());
                    
                    const opt1 = document.createElement('option');
                    opt1.value = p.name;
                    opt1.text = p.name;
                    select1.appendChild(opt1);

                    const opt2 = document.createElement('option');
                    opt2.value = p.name;
                    opt2.text = p.name;
                    select2.appendChild(opt2);
                    
                    // ラベル代わりの小さな点（見やすさ用）
                    log(`点追加: ${p.name} (X:${p.x.toFixed(3)}, Y:${p.y.toFixed(3)})`);
                });

                if (data.points.length > 1) {
                    select2.selectedIndex = 1;
                }
                document.getElementById('point-selectors').style.display = 'flex';

                // 結線データの配列が空かどうかを判定
                if (data.connections.length === 0) {
                    // 1. 座標データのみの場合（結線データなし）
                    // 線の生成処理をスキップする
                    log(`読み込み完了: 点数 ${data.points.length} (結線データなし・点のみ描画)`);
                } else {
                    // 2. 座標データ＋画地データの場合（結線データあり）
                    // B01などの結線データに基づいて線を生成する
                    const lineMat = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
                    data.connections.forEach(parts => {
                        const validPoints = parts.filter(part => this.pointMap.has(part));
                        
                        if (validPoints.length > 1) {
                            for (let i = 0; i < validPoints.length - 1; i++) {
                                const p1 = this.pointMap.get(validPoints[i]);
                                const p2 = this.pointMap.get(validPoints[i+1]);
                                const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                                const line = new THREE.Line(geometry, lineMat);
                                this.mapGroup.add(line);
                            }
                            // 閉じる場合は最後と最初を結ぶ
                            if (validPoints.length > 2) {
                                const p1 = this.pointMap.get(validPoints[validPoints.length - 1]);
                                const p2 = this.pointMap.get(validPoints[0]);
                                const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                                const line = new THREE.Line(geometry, lineMat);
                                this.mapGroup.add(line);
                            }
                        }
                    });
                    log(`読み込み完了: 点数 ${data.points.length}, 結線数 ${data.connections.length}`);
                }

                this.mapGroup.visible = false;
            }

            clearMap() {
                while(this.mapGroup.children.length > 0){ 
                    this.mapGroup.remove(this.mapGroup.children[0]); 
                }
                this.placeState = 0;
                this.marker1.visible = false;
                this.marker2.visible = false;
                document.getElementById('point-selectors').style.display = 'none';
            }

            onSelect() {
                if (!this.reticle.visible || !this.simaData) return;

                if (this.placeState === 1) {
                    // Tap 1
                    this.tap1Pos.setFromMatrixPosition(this.reticle.matrix);
                    this.marker1.position.copy(this.tap1Pos);
                    this.marker1.visible = true;
                    
                    this.placeState = 2;
                    document.getElementById('ar-guide-msg').innerText = "2点目をタップしてください";
                    log("1点目を記録しました。続いて2点目をタップしてください。");
                } else if (this.placeState === 2) {
                    // Tap 2
                    this.tap2Pos.setFromMatrixPosition(this.reticle.matrix);
                    this.marker2.position.copy(this.tap2Pos);
                    this.marker2.visible = true;

                    this.placeState = 0; // done
                    document.getElementById('ar-overlay').style.display = 'none';
                    log("2点目を記録しました。計算を開始します...");

                    this.calculateAndPlace();
                }
            }

            calculateAndPlace() {
                const pt1Name = document.getElementById('ref-point-1').value;
                const pt2Name = document.getElementById('ref-point-2').value;

                if (!this.pointMap.has(pt1Name) || !this.pointMap.has(pt2Name)) {
                    log("エラー: 選択された基準点が見つかりません", "error");
                    return;
                }

                // SIMA space local coordinates (relative to center)
                const simaPt1 = this.pointMap.get(pt1Name);
                const simaPt2 = this.pointMap.get(pt2Name);

                const worldPt1 = this.tap1Pos;
                const worldPt2 = this.tap2Pos;

                // 1. Calculate Scale
                const simaDist = new THREE.Vector2(simaPt2.x - simaPt1.x, simaPt2.z - simaPt1.z).length();
                const worldDist = new THREE.Vector2(worldPt2.x - worldPt1.x, worldPt2.z - worldPt1.z).length();
                
                let scale = 1.0;
                if (simaDist > 0.001) {
                    scale = worldDist / simaDist;
                } else {
                    log("警告: 基準点間の距離が近すぎます", "error");
                }
                
                this.mapGroup.scale.set(scale, scale, scale);

                // 2. Calculate Rotation (Yaw around Y axis)
                const vSima = new THREE.Vector3(simaPt2.x - simaPt1.x, 0, simaPt2.z - simaPt1.z).normalize();
                const vWorld = new THREE.Vector3(worldPt2.x - worldPt1.x, 0, worldPt2.z - worldPt1.z).normalize();
                
                const quaternion = new THREE.Quaternion().setFromUnitVectors(vSima, vWorld);
                this.mapGroup.setRotationFromQuaternion(quaternion);

                // 3. Calculate Translation
                const transformedSimaPt1 = simaPt1.clone().multiplyScalar(scale).applyQuaternion(quaternion);
                this.mapGroup.position.copy(worldPt1).sub(transformedSimaPt1);
                
                this.mapGroup.visible = true;
                
                const euler = new THREE.Euler().setFromQuaternion(quaternion, 'YXZ');
                const rotDeg = (euler.y * 180 / Math.PI).toFixed(2);
                
                log(`補正完了: スケール=${scale.toFixed(4)}, 回転=${rotDeg}度`);
                
                setTimeout(() => {
                    this.marker1.visible = false;
                    this.marker2.visible = false;
                }, 2000);
            }

            animate() {
                this.renderer.setAnimationLoop((timestamp, frame) => this.render(timestamp, frame));
            }

            render(timestamp, frame) {
                if (frame) {
                    const referenceSpace = this.renderer.xr.getReferenceSpace();
                    const session = this.renderer.xr.getSession();

                    if (this.hitTestSourceRequested === false) {
                        session.requestReferenceSpace('viewer').then((referenceSpace) => {
                            session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                                this.hitTestSource = source;
                            });
                        });
                        session.addEventListener('end', () => {
                            this.hitTestSourceRequested = false;
                            this.hitTestSource = null;
                        });
                        this.hitTestSourceRequested = true;
                    }

                    if (this.hitTestSource) {
                        const hitTestResults = frame.getHitTestResults(this.hitTestSource);
                        if (hitTestResults.length) {
                            const hit = hitTestResults[0];
                            const pose = hit.getPose(referenceSpace);
                            if (pose) {
                                this.reticle.visible = true;
                                this.reticle.matrix.fromArray(pose.transform.matrix);
                            } else {
                                this.reticle.visible = false;
                            }
                        } else {
                            this.reticle.visible = false;
                        }
                    }
                }
                this.renderer.render(this.scene, this.camera);
            }
        }

        // --- Initialization ---
        const app = new ARApp();
        app.animate();

        const fileInput = document.getElementById('file-input');
        const placeBtn = document.getElementById('place-btn');
        const resetBtn = document.getElementById('reset-btn');

        fileInput.addEventListener('change', async (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                log(`ファイル選択: ${file.name}`);
                try {
                    const data = await SIMAParser.parse(file);
                    app.loadSIMA(data);
                    document.getElementById('status').innerText = `読込済: ${file.name}`;
                    placeBtn.disabled = false;
                    placeBtn.classList.remove('btn-disabled');
                } catch (err) {
                    log(`エラー: ${err.message}`, 'error');
                }
                e.target.value = ''; // 同じファイルを再選択できるようにリセット
            }
        });

        placeBtn.addEventListener('click', () => {
            if (!app.simaData) return;

            const p1 = document.getElementById('ref-point-1').value;
            const p2 = document.getElementById('ref-point-2').value;
            if (p1 === p2) {
                alert("異なる基準点を2つ選択してください");
                return;
            }

            app.placeState = 1;
            app.mapGroup.visible = false;
            app.marker1.visible = false;
            app.marker2.visible = false;
            
            document.getElementById('ar-guide-msg').innerText = "1点目の現実位置をタップしてください";
            document.getElementById('ar-overlay').style.display = 'flex';
            log(`配置開始: [${p1}] と [${p2}] の現実位置を指定します`);
        });

        resetBtn.addEventListener('click', () => {
            app.clearMap();
            app.mapGroup.visible = false;
            document.getElementById('status').innerText = "SIMAファイルを読み込んでください";
            placeBtn.disabled = true;
            placeBtn.classList.add('btn-disabled');
            log("リセットしました");
        });

    </script>
</body>
</html>
